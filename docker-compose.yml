version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.*true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - redpanda

  producer:
    build: .
    command: python -m src.producer --rate 5000
    environment:
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  engine:
    build: .
    command: python -m src.engine
    environment:
      - KAFKA_BROKER=redpanda:9092
    volumes:
      - ./storage:/app/storage
    depends_on:
      redpanda:
        condition: service_healthy
      producer:
        condition: service_started

  api:
    build: .
    command: uvicorn src.api:app --host 0.0.0.0 --port 8080
    environment:
      - KAFKA_BROKER=redpanda:9092
    volumes:
      - ./storage:/app/storage
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  frontend:
    build: frontend/
    ports:
      - "5173:5173"
    depends_on:
      - api
